spring:
  application:
    name: catalog-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:15432/catalog_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}

server:
  port: 8081
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    git:
      mode: full
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: false
    sampling:
      probability: 1.0

# Swagger configuration
swagger:
  api-gateway-url: http://localhost:8989/catalog

catalog:
  page-size: 10