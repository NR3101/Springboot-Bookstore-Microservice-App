spring:
  application:
    name: catalog-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:15432/catalog_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}


server:
  port: 8081
  shutdown: graceful


management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    git:
      mode: full