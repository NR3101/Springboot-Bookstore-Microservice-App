spring:
  application:
    name: order-service
  #  Database configuration
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:25432/order_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:password}
  jpa:
    open-in-view: false
  #    RabbitMQ configuration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

#    Order Events configuration for RabbitMQ
orders:
  catalog-service-url: http://localhost:8081
  order-events-exchange: orders-exchange
  new-orders-queue: new-orders
  delivered-orders-queue: delivered-orders
  cancelled-orders-queue: cancelled-orders
  error-orders-queue: error-orders

# Resilience4j configuration
resilience4j:
  #  For retry
  retry:
    backends: # backend is the name you gave to the retry configuration
      catalog-service:
        max-attempts: 2
        wait-duration: 300ms
  #  For circuit breaker
  circuitbreaker:
    backends: # backend is the name you gave to the circuit breaker configuration
      catalog-service:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 6
        minimum-number-of-calls: 4
        wait-duration-in-open-state: 20s
        permitted-number-of-calls-in-half-open-state: 2
        failure-rate-threshold: 50

server:
  port: 8082
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: "*"
  info:
    git:
      mode: full